name: Update Profile README

on:
  schedule:
    - cron: "0 8 * * *"
  repository_dispatch:
    types: [update-profile]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Clone Index submodules (sparse)
        env:
          BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${BOT_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${BOT_GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
          git clone --no-checkout --depth 1 \
            "https://x-access-token:${BOT_GITHUB_TOKEN}@github.com/AceDataCloud/Index.git" /tmp/index
          cd /tmp/index
          git sparse-checkout init --cone
          git sparse-checkout set PlatformBackend MCPs Clis APIs
          git checkout
          git submodule update --init --depth 1 --remote PlatformBackend MCPs Clis APIs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate profile README
        env:
          ACEDATACLOUD_OPENAI_KEY: ${{ secrets.ACEDATACLOUD_OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: python generate.py --workspace /tmp/index

      - name: Commit and push if changed
        run: |
          git config user.name "Ace Data Cloud Dev"
          git config user.email "dev@acedata.cloud"
          git add profile/README.md
          git diff --staged --quiet || (git commit -m "chore: auto-update organization profile" && git push)
